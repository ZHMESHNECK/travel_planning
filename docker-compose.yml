services:
  api:
    build: .
    container_name: travel_planner_api
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file on the host so data survives container restarts
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/travel_planner.db
      - BASIC_AUTH_USERNAME=admin
      - BASIC_AUTH_PASSWORD=changeme
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sqlite_data: